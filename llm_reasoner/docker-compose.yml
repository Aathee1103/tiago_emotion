services:
  uncom:
    image: uncom:latest
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/localtime:/etc/localtime:ro
      - ./models:/root/models:ro
      - ./main.py:/root/main.py:rw
      - ./uncom_utils:/root/uncom_utils:rw
    command: ["/usr/bin/python3", "/root/main.py"]
    stdin_open: true
    tty: true
